<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManaMarket Ultra | Network Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
        .active-tab { color: #3b82f6; position: relative; }
        .active-tab::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #3b82f6; border-radius: 2px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        tr:hover .view-link { opacity: 1; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="authModal" class="fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6 hidden">
        <div class="glass max-w-md w-full p-10 rounded-[40px] shadow-2xl border border-white/10 text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                <i data-lucide="shield-check" class="text-white"></i>
            </div>
            <h2 id="authTitle" class="text-3xl font-black mb-2">Initialize Session</h2>
            <p id="authSub" class="text-slate-500 text-sm mb-8">Access the ManaMarket Cloud Network</p>
            <div class="space-y-4">
                <input type="text" id="authEmail" placeholder="Email Address" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="authPass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="handleAuthAction()" id="authMainBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-blue-900/40">Secure Sign In</button>
                <button onclick="toggleAuthMode()" id="authSwitch" class="text-xs text-slate-500 hover:text-white font-bold uppercase tracking-widest transition-colors">Request Access (Register)</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1650px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6 glass p-6 rounded-[32px]">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.href=location.pathname">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="zap" class="text-white"></i></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">ManaMarket <span class="text-blue-500">Ultra</span></h1>
                    <div class="flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span><span class="text-[9px] font-bold text-slate-400 uppercase">Live Network</span></div>
                </div>
            </div>

            <nav class="flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-400">
                <button onclick="switchTab('search')" id="tabSearch" class="active-tab">Database</button>
                <button onclick="switchTab('sets')" id="tabSets">Sets</button>
                <button onclick="switchTab('decks')" id="tabDecks">Decks</button>
                <button onclick="switchTab('vault')" id="tabVault">Vault</button>
                <button onclick="switchTab('members')" id="tabMembers" class="text-amber-500">Network</button>
                <button onclick="switchTab('profile')" id="tabProfile" class="text-violet-400">Profile</button>
            </nav>

            <div id="userDisplay" class="flex items-center gap-4 bg-slate-950/50 p-2 pr-6 rounded-2xl border border-white/5 cursor-pointer" onclick="switchTab('profile')">
                <div id="userAvatar" class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center font-black text-xs">?</div>
                <div class="text-left">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Archivist</p>
                    <p id="userName" class="text-sm font-black text-white">Guest</p>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 glass rounded-[40px] p-6 h-[850px] flex flex-col border border-white/5 shadow-2xl">
                <div id="sidebarHeader" class="mb-6">
                    <div class="relative">
                        <input type="text" id="dbSearch" class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-4 px-12 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Search card names...">
                        <i data-lucide="search" class="absolute left-4 top-4 w-5 text-slate-500"></i>
                    </div>
                </div>
                <div id="listContainer" class="flex-1 overflow-y-auto custom-scroll pr-2 space-y-2"></div>
            </aside>

            <section class="lg:col-span-8 space-y-8">
                
                <div id="searchView" class="glass rounded-[40px] p-10 min-h-[500px] border border-white/5">
                    <div id="cardContent" class="hidden">
                        <div class="flex flex-col xl:flex-row gap-12">
                            <div class="w-full xl:w-[320px] shrink-0">
                                <img id="displayImg" class="w-full rounded-[24px] shadow-2xl mb-6 ring-1 ring-white/10">
                                <button onclick="addToVault()" class="w-full py-4 bg-emerald-600 rounded-xl font-black text-xs uppercase mb-3">Add to Vault</button>
                                <select id="deckAssignSelect" onchange="addCardToDeck(this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-[10px] font-bold uppercase"></select>
                            </div>
                            <div class="flex-1">
                                <h2 id="displayName" class="text-5xl font-black"></h2>
                                <p id="displaySet" class="text-blue-500 font-bold uppercase text-xs mb-8"></p>
                                <div class="grid grid-cols-3 gap-4 mb-8">
                                    <div class="bg-slate-950 p-6 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">GBP</p><p id="displayPrice" class="text-2xl font-black text-white">£0.00</p></div>
                                    <div class="bg-slate-950 p-6 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">Mana</p><p id="displayCMC" class="text-2xl font-black text-blue-400">0</p></div>
                                    <div class="bg-slate-950 p-6 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">Status</p><p class="text-xs font-black text-emerald-500 uppercase">Legal</p></div>
                                </div>
                                <div class="h-64 bg-slate-950/50 rounded-3xl p-6 border border-white/5"><canvas id="priceChart"></canvas></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="vaultView" class="hidden glass rounded-[40px] p-8 border border-white/5">
                    <div class="flex justify-between items-end mb-8">
                        <h2 class="text-4xl font-black">Vault</h2>
                        <select id="vType" onchange="renderVault()" class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-xs font-bold"><option value="all">All Types</option><option value="Creature">Creature</option><option value="Instant">Instant</option></select>
                    </div>
                    <div id="vaultGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
                </div>

                <div id="membersView" class="hidden glass rounded-[40px] p-10 border border-white/5">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-black">Member <span class="text-amber-500">Network</span></h2>
                        <div class="flex gap-4">
                            <div class="text-right"><p class="text-[9px] text-slate-500 font-bold uppercase">Net Value</p><p id="netTotalValue" class="text-xl font-black text-emerald-400">£0</p></div>
                            <div class="text-right"><p class="text-[9px] text-slate-500 font-bold uppercase">Total Assets</p><p id="netTotalDecks" class="text-xl font-black text-blue-400">0</p></div>
                        </div>
                    </div>
                    <div class="overflow-hidden">
                        <table class="w-full text-left border-separate border-spacing-y-2">
                            <thead class="text-[10px] font-black text-slate-500 uppercase">
                                <tr><th class="pl-6">Rank</th><th>Archivist</th><th>Vault Worth</th><th class="text-center">Decks</th><th class="text-right pr-6">Archive</th></tr>
                            </thead>
                            <tbody id="memberList"></tbody>
                        </table>
                    </div>
                </div>

                <div id="decksView" class="hidden glass rounded-[40px] p-8 border border-white/5">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-4xl font-black">Archive Decks</h2>
                        <button onclick="createNewDeck()" class="bg-blue-600 px-6 py-3 rounded-2xl font-bold">+ New Build</button>
                    </div>
                    <div id="decksGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

                <div id="profileView" class="hidden glass rounded-[40px] p-12 border border-white/5">
                    <div class="flex flex-col md:flex-row items-center gap-10 mb-12 pb-12 border-b border-white/5">
                        <div id="profAvatar" class="w-32 h-32 rounded-[40px] bg-blue-600 flex items-center justify-center text-5xl font-black shadow-2xl">?</div>
                        <div class="text-center md:text-left flex-1">
                            <h2 id="profName" class="text-6xl font-black tracking-tighter">Archivist</h2>
                            <p id="profJoined" class="text-slate-500 font-bold uppercase text-[10px] mt-2">Member Since 2026</p>
                            <div class="mt-6 flex flex-wrap gap-3">
                                <button id="shareBtn" onclick="generatePublicLink()" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Share Public Profile</button>
                                <button onclick="logout()" class="bg-rose-500/10 text-rose-500 px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-rose-500/20">Sign Out</button>
                            </div>
                        </div>
                    </div>
                    <div id="profileStats" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                </div>

            </section>
        </main>
    </div>

    <script>
        // CONFIG
        let rates = { GBP: 0.79 };
        let activeCard = null;
        let pChart = null;
        let currentUser = JSON.parse(localStorage.getItem('mm_session')) || null;
        let isRegister = false;

        // AUTH SYSTEM
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('authTitle').innerText = isRegister ? 'Create Account' : 'Initialize Session';
            document.getElementById('authMainBtn').innerText = isRegister ? 'Register' : 'Secure Sign In';
        }

        function handleAuthAction() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return;
            let users = JSON.parse(localStorage.getItem('mm_users')) || {};
            
            if(isRegister) {
                if(users[email]) return alert("Account Exists");
                users[email] = { pass: btoa(pass), vault: [], decks: [], metadata: { joined: 'March 2026', avatar: 'bg-blue-600' } };
                localStorage.setItem('mm_users', JSON.stringify(users));
            } else {
                if(!users[email] || users[email].pass !== btoa(pass)) return alert("Access Denied");
            }
            localStorage.setItem('mm_session', JSON.stringify(email));
            location.reload();
        }

        function logout() { localStorage.removeItem('mm_session'); location.reload(); }

        const allUsers = JSON.parse(localStorage.getItem('mm_users')) || {};
        const userData = currentUser ? allUsers[currentUser] : null;

        // NAVIGATION
        function switchTab(mode) {
            ['search', 'sets', 'decks', 'vault', 'profile', 'members'].forEach(m => {
                const el = document.getElementById(`${m}View`);
                if(el) el.classList.toggle('hidden', m !== mode);
                const btn = document.getElementById(`tab${m.charAt(0).toUpperCase()+m.slice(1)}`);
                if(btn) btn.classList.toggle('active-tab', m === mode);
            });
            if(mode === 'members') renderMembers();
            if(mode === 'vault') renderVault();
            if(mode === 'decks') renderDecks();
            if(mode === 'profile') renderProfile();
            if(mode === 'sets') loadSets();
        }

        // DATABASE SEARCH
        document.getElementById('dbSearch').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(e.target.value)}`);
                const data = await res.json();
                if(data.data) renderList(data.data);
            }
        });

        async function loadSets() {
            const res = await fetch('https://api.scryfall.com/sets');
            const data = await res.json();
            document.getElementById('listContainer').innerHTML = data.data.filter(s => ['expansion','core'].includes(s.set_type)).map(s => `
                <div onclick="browseSet('${s.code}')" class="p-3 bg-slate-900 border border-white/5 rounded-xl flex items-center gap-3 cursor-pointer hover:bg-blue-600/20">
                    <img src="${s.icon_svg_uri}" class="w-4 h-4 invert opacity-70">
                    <span class="text-xs font-bold">${s.name}</span>
                </div>
            `).join('');
        }

        async function browseSet(code) {
            const res = await fetch(`https://api.scryfall.com/cards/search?q=set:${code}`);
            const data = await res.json();
            renderList(data.data);
        }

        function renderList(cards) {
            document.getElementById('listContainer').innerHTML = cards.map(c => `
                <div onclick='showCard(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="p-4 bg-slate-900 border border-white/5 rounded-2xl flex justify-between cursor-pointer hover:border-blue-500/50">
                    <span class="text-xs font-bold truncate w-40">${c.name}</span>
                    <span class="text-[10px] text-blue-400">£${(parseFloat(c.prices.usd || 0) * rates.GBP).toFixed(2)}</span>
                </div>
            `).join('');
        }

        function showCard(card) {
            activeCard = card;
            document.getElementById('cardContent').classList.remove('hidden');
            document.getElementById('displayImg').src = card.image_uris?.normal || card.card_faces[0].image_uris.normal;
            document.getElementById('displayName').innerText = card.name;
            document.getElementById('displaySet').innerText = card.set_name;
            document.getElementById('displayPrice').innerText = `£${(parseFloat(card.prices.usd || 0) * rates.GBP).toFixed(2)}`;
            document.getElementById('displayCMC').innerText = card.cmc || 0;
            renderChart(parseFloat(card.prices.usd || 0));
        }

        // VAULT & SAVING
        function save() {
            allUsers[currentUser] = userData;
            localStorage.setItem('mm_users', JSON.stringify(allUsers));
        }

        function addToVault() {
            userData.vault.push({ id: Date.now(), name: activeCard.name, price: parseFloat(activeCard.prices.usd || 0), img: activeCard.image_uris?.small || activeCard.card_faces[0].image_uris.small });
            save(); alert("Vaulted");
        }

        function renderVault(providedVault = null) {
            const vault = providedVault || userData.vault;
            document.getElementById('vaultGrid').innerHTML = vault.map(c => `
                <div class="relative group rounded-2xl overflow-hidden border border-white/5">
                    <img src="${c.img}" class="w-full">
                    <div class="absolute inset-0 bg-slate-950/80 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                        <button onclick="removeCard(${c.id})" class="text-[9px] font-black uppercase text-rose-500">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        // NETWORK / MEMBERS VIEW
        function renderMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            let totalVal = 0; let totalDecks = 0;
            
            const memberArr = Object.keys(allUsers).map(email => {
                const worth = allUsers[email].vault.reduce((s, c) => s + c.price, 0) * rates.GBP;
                totalVal += worth;
                totalDecks += allUsers[email].decks.length;
                return { email, worth, deckCount: allUsers[email].decks.length };
            }).sort((a,b) => b.worth - a.worth);

            memberArr.forEach((m, i) => {
                list.innerHTML += `
                    <tr class="glass group">
                        <td class="py-4 pl-6 rounded-l-2xl font-black text-slate-500">#${i+1}</td>
                        <td class="py-4 font-bold text-sm">${m.email.split('@')[0]} ${m.email === currentUser ? '(You)' : ''}</td>
                        <td class="py-4 font-black text-emerald-400 text-sm">£${m.worth.toFixed(2)}</td>
                        <td class="py-4 text-center text-xs font-bold text-slate-400">${m.deckCount}</td>
                        <td class="py-4 text-right pr-6 rounded-r-2xl">
                            <button onclick="viewPublicArchive('${m.email}')" class="view-link opacity-0 text-[9px] font-black uppercase text-blue-500 transition-opacity">View Profile →</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('netTotalValue').innerText = `£${totalVal.toLocaleString()}`;
            document.getElementById('netTotalDecks').innerText = totalDecks;
        }

        // PROFILE & SHARING
        function renderProfile() {
            const worth = userData.vault.reduce((s, c) => s + c.price, 0) * rates.GBP;
            document.getElementById('userName').innerText = currentUser.split('@')[0];
            document.getElementById('userAvatar').innerText = currentUser[0].toUpperCase();
            document.getElementById('profAvatar').innerText = currentUser[0].toUpperCase();
            document.getElementById('profName').innerText = currentUser.split('@')[0];
            document.getElementById('profileStats').innerHTML = `
                <div class="bg-slate-950 p-8 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">Worth</p><h3 class="text-3xl font-black text-emerald-400">£${worth.toFixed(2)}</h3></div>
                <div class="bg-slate-950 p-8 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">Assets</p><h3 class="text-3xl font-black text-blue-400">${userData.vault.length} Cards</h3></div>
                <div class="bg-slate-950 p-8 rounded-3xl border border-white/5"><p class="text-[9px] text-slate-500 uppercase">Status</p><h3 class="text-3xl font-black text-violet-400">Archivist</h3></div>
            `;
        }

        function generatePublicLink() {
            const data = { name: currentUser.split('@')[0], vault: userData.vault };
            const link = `${window.location.origin}${window.location.pathname}#view:${btoa(JSON.stringify(data))}`;
            navigator.clipboard.writeText(link); alert("Link Copied!");
        }

        function viewPublicArchive(email) {
            const data = { name: email.split('@')[0], vault: allUsers[email].vault };
            renderPublicMode(data);
        }

        function renderPublicMode(data) {
            switchTab('profile');
            document.getElementById('profName').innerText = `${data.name}'s Archive`;
            document.getElementById('profJoined').innerText = "Public Viewing Mode";
            document.getElementById('shareBtn').classList.add('hidden');
            renderVault(data.vault);
        }

        // UTILS
        function renderChart(base) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, { type: 'line', data: { labels: ['W1','W2','W3','W4'], datasets: [{ data: [base*0.9, base*1.1, base*0.95, base], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } } } } });
        }

        function init() {
            const hash = window.location.hash;
            if(hash.startsWith('#view:')) {
                const data = JSON.parse(atob(hash.replace('#view:', '')));
                renderPublicMode(data); return;
            }
            if(!currentUser) document.getElementById('authModal').classList.remove('hidden');
            else { 
                document.getElementById('userName').innerText = currentUser.split('@')[0];
                document.getElementById('userAvatar').innerText = currentUser[0].toUpperCase();
                switchTab('search'); 
            }
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
