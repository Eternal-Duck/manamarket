<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG: Draft & Crack Ultra</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [v-cloak] { display: none; }
        .rarity-mythic { border-color: #ff4500; box-shadow: 0 0 20px rgba(255, 69, 0, 0.4); animation: glow 2s infinite alternate; }
        .rarity-rare { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        @keyframes glow { from { box-shadow: 0 0 10px #ff4500; } to { box-shadow: 0 0 25px #ff4500; } }
        .draft-enter-active { transition: all 0.5s ease-out; }
        .draft-enter-from { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body class="bg-neutral-950 text-slate-100 font-sans selection:bg-orange-500/30">

<div id="app" v-cloak class="min-h-screen flex flex-col">
    <nav class="bg-black/80 backdrop-blur border-b border-white/10 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i data-lucide="sparkles" class="text-orange-500"></i>
                <h1 class="font-black tracking-tighter text-xl">DRAFT SIM 2026</h1>
            </div>

            <div class="flex items-center gap-3 bg-neutral-900 p-1 rounded-xl">
                <button @click="mode = 'crack'" :class="mode==='crack'?'bg-orange-600':'text-zinc-500'" class="px-4 py-2 rounded-lg text-xs font-bold transition">CRACK</button>
                <button @click="startDraft" :class="mode==='draft'?'bg-orange-600':'text-zinc-500'" class="px-4 py-2 rounded-lg text-xs font-bold transition">DRAFT</button>
                <button @click="mode = 'binder'" :class="mode==='binder'?'bg-orange-600':'text-zinc-500'" class="px-4 py-2 rounded-lg text-xs font-bold transition">VAULT</button>
            </div>

            <div class="flex items-center gap-4">
                <select v-model="selectedSet" class="bg-neutral-800 text-xs p-2 rounded border-none outline-none max-w-[150px]">
                    <option v-for="s in sets" :key="s.code" :value="s.code">{{ s.name }}</option>
                </select>
                <div class="text-right">
                    <p class="text-[9px] uppercase text-zinc-500 font-bold">Gold</p>
                    <p class="text-yellow-500 font-mono font-bold">${{ balance }}</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="h-1 bg-neutral-800 w-full overflow-hidden">
        <div class="h-full bg-orange-500 transition-all duration-1000" :style="{width: (pityCount * 10) + '%'}"></div>
    </div>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
        <div v-if="mode === 'crack'" class="space-y-8 text-center">
            <div v-if="!currentPack.length" class="py-32">
                <button @click="pullBooster" :disabled="loading" class="group relative px-12 py-6 bg-white text-black font-black text-2xl rounded-2xl hover:bg-orange-500 hover:text-white transition-all transform active:scale-95 shadow-2xl">
                    {{ loading ? 'SUMMONING...' : 'CRACK PACK' }}
                    <div class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-2 py-1 rounded">HOT!</div>
                </button>
            </div>

            <div v-else class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <div v-for="(card, i) in currentPack" :key="i" class="transition-all hover:-translate-y-2">
                    <img :src="card.image_uris?.normal" class="rounded-xl border-2 shadow-2xl" :class="getRarityClass(card.rarity)">
                    <p class="mt-2 text-[10px] font-mono text-green-400">${{ card.prices.usd || '0.00' }}</p>
                </div>
            </div>
        </div>

        <div v-if="mode === 'draft'" class="space-y-6">
            <div class="flex justify-between items-center bg-neutral-900 p-4 rounded-xl border border-white/5">
                <h2 class="font-bold uppercase tracking-widest text-orange-500">Pick {{ draftPick }} / 15</h2>
                <p class="text-xs text-zinc-400">The AI is waiting for your move...</p>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-8 gap-4">
                <div v-for="(card, i) in draftPack" :key="i" @click="pickCard(i)" class="cursor-pointer group relative">
                    <img :src="card.image_uris?.normal" class="rounded-lg shadow-lg group-hover:ring-4 ring-orange-500 transition-all">
                    <div class="absolute inset-0 bg-orange-500/20 opacity-0 group-hover:opacity-100 transition flex items-center justify-center font-black">PICK</div>
                </div>
            </div>
        </div>

        <div v-if="mode === 'binder'" class="space-y-6">
            <div class="flex justify-between items-end">
                <h2 class="text-3xl font-black italic">COLLECTION</h2>
                <button @click="bulkSell" class="text-[10px] font-black bg-white text-black px-4 py-2 rounded-full hover:bg-orange-500 hover:text-white transition">SELL COMMONS/UNCOMMONS</button>
            </div>
            <div class="grid grid-cols-4 md:grid-cols-8 lg:grid-cols-10 gap-2">
                <div v-for="(card, i) in binder" :key="i" class="relative group">
                    <img :src="card.image_uris?.small" class="rounded shadow-md group-hover:scale-150 group-hover:z-50 transition-all cursor-zoom-in">
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted, computed, nextTick } = Vue;

    createApp({
        setup() {
            const mode = ref('crack');
            const sets = ref([]);
            const selectedSet = ref('MKM');
            const currentPack = ref([]);
            const draftPack = ref([]);
            const draftPick = ref(1);
            const binder = ref([]);
            const balance = ref(0);
            const pityCount = ref(0);
            const loading = ref(false);

            onMounted(async () => {
                // Fetch Sets
                const res = await fetch('https://api.scryfall.com/sets');
                const data = await res.json();
                sets.value = data.data.filter(s => s.set_type === 'expansion' || s.set_type === 'core');
                
                // Load Save
                const saved = JSON.parse(localStorage.getItem('mtg_mega_save') || '{}');
                binder.value = saved.binder || [];
                balance.value = saved.balance || 0;
                
                nextTick(() => lucide.createIcons());
            });

            const save = () => {
                localStorage.setItem('mtg_mega_save', JSON.stringify({ binder: binder.value, balance: balance.value }));
            };

            const getRarityClass = (r) => {
                if(r === 'mythic') return 'rarity-mythic';
                if(r === 'rare') return 'rarity-rare';
                return 'border-zinc-800';
            };

            const pullBooster = async () => {
                loading.value = true;
                const res = await fetch(`https://api.scryfall.com/cards/search?q=s%3A${selectedSet.value}+is%3Abooster`);
                const data = await res.json();
                const cards = data.data;

                // Simple Collation
                const pack = [];
                const c = cards.filter(x => x.rarity === 'common');
                const u = cards.filter(x => x.rarity === 'uncommon');
                const r = cards.filter(x => x.rarity === 'rare' || x.rarity === 'mythic');

                for(let i=0; i<10; i++) pack.push(c[Math.floor(Math.random()*c.length)]);
                for(let i=0; i<3; i++) pack.push(u[Math.floor(Math.random()*u.length)]);
                
                // R/M Logic
                const hit = (Math.random() < 0.12 || pityCount.value >= 10) ? r.find(x => x.rarity === 'mythic') || r[0] : r.filter(x => x.rarity === 'rare')[0];
                pack.push(hit);
                if(hit.rarity === 'mythic') pityCount.value = 0; else pityCount.value++;

                currentPack.value = pack.reverse();
                binder.value = [...pack, ...binder.value];
                save();
                loading.value = false;
                nextTick(() => lucide.createIcons());
            };

            const startDraft = async () => {
                mode.value = 'draft';
                draftPick.value = 1;
                // Fetch pack
                const res = await fetch(`https://api.scryfall.com/cards/search?q=s%3A${selectedSet.value}+is%3Abooster`);
                const data = await res.json();
                draftPack.value = data.data.sort(() => 0.5 - Math.random()).slice(0, 15);
            };

            const pickCard = (index) => {
                const card = draftPack.value[index];
                binder.value.unshift(card);
                draftPack.value.splice(index, 1);
                
                // AI picks 1 card (removes it)
                if(draftPack.value.length > 0) {
                    draftPack.value.splice(Math.floor(Math.random() * draftPack.value.length), 1);
                }

                draftPick.value++;
                if(draftPack.value.length <= 0) {
                    alert("Draft Finished! Cards added to vault.");
                    mode.value = 'binder';
                }
                save();
            };

            const bulkSell = () => {
                const trash = binder.value.filter(c => c.rarity === 'common' || c.rarity === 'uncommon');
                balance.value = (parseFloat(balance.value) + (trash.length * 0.05)).toFixed(2);
                binder.value = binder.value.filter(c => c.rarity !== 'common' && c.rarity !== 'uncommon');
                save();
            };

            return { mode, sets, selectedSet, currentPack, draftPack, draftPick, binder, balance, pityCount, loading, pullBooster, startDraft, pickCard, getRarityClass, bulkSell };
        }
    }).mount('#app');
</script>
</body>
</html>
