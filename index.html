<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeswalker Cracker | MTG Simulator</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [v-cloak] { display: none; }
        .card-glow-mythic { box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .card-glow-rare { box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-neutral-950 text-slate-100 min-h-screen">

<div id="app" v-cloak>
    <nav class="sticky top-0 z-50 bg-neutral-900/80 backdrop-blur-md border-b border-neutral-800 p-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-orange-600 p-2 rounded-lg text-white">
                    <i data-lucide="package"></i>
                </div>
                <h1 class="text-xl font-black tracking-tight uppercase">Mythic Pulls</h1>
            </div>

            <div class="flex bg-neutral-800 p-1 rounded-xl">
                <button @click="view = 'cracker'" 
                    :class="view === 'cracker' ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-white'"
                    class="px-4 py-2 rounded-lg flex items-center gap-2 transition-all text-sm font-bold">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> Pack Cracker
                </button>
                <button @click="view = 'binder'" 
                    :class="view === 'binder' ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-white'"
                    class="px-4 py-2 rounded-lg flex items-center gap-2 transition-all text-sm font-bold">
                    <i data-lucide="book" class="w-4 h-4"></i> Binder ({{ binder.length }})
                </button>
            </div>

            <div class="flex items-center gap-3">
                <div class="hidden md:block text-right mr-2">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Vault Value</p>
                    <p class="text-green-400 font-mono text-lg">${{ totalBinderValue }}</p>
                </div>
                <input v-model="setCode" @keyup.enter="pullBooster"
                    class="w-20 bg-neutral-800 border border-neutral-700 rounded-lg px-2 py-2 text-center font-bold focus:ring-2 focus:ring-orange-500 outline-none"
                    placeholder="SET" maxlength="4">
                <button @click="pullBooster" :disabled="loading"
                    class="bg-white text-black font-black px-6 py-2 rounded-lg hover:bg-orange-500 hover:text-white transition-all disabled:opacity-50 flex items-center gap-2">
                    <span v-if="loading">...</span>
                    <span v-else>OPEN</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div v-if="view === 'cracker'" class="space-y-8">
            <div v-if="currentPack.length" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <div v-for="(card, i) in currentPack" :key="i" 
                    class="group relative bg-neutral-900 border-2 rounded-2xl p-2 transition-all hover:-translate-y-2 shadow-2xl"
                    :class="getRarityClass(card.rarity)">
                    
                    <img :src="card.image_uris?.normal" :alt="card.name" class="rounded-xl mb-3">
                    
                    <div class="px-1">
                        <p class="text-xs font-bold truncate">{{ card.name }}</p>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[10px] uppercase font-black opacity-50 tracking-tighter">{{ card.rarity }}</span>
                            <span class="text-sm font-mono text-green-400 font-bold">${{ card.prices.usd || '0.00' }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div v-else class="h-96 flex flex-col items-center justify-center border-2 border-dashed border-neutral-800 rounded-3xl text-neutral-600">
                <i data-lucide="box" class="w-16 h-16 mb-4 opacity-20"></i>
                <p class="text-lg">Enter a set code like <b>OTJ</b>, <b>MKM</b>, or <b>LCI</b> to begin.</p>
            </div>
        </div>

        <div v-if="view === 'binder'" class="animate-in fade-in duration-500">
            <div class="flex justify-between items-end mb-8">
                <h2 class="text-3xl font-black flex items-center gap-3">THE VAULT <i data-lucide="trending-up" class="text-green-500"></i></h2>
                <button @click="clearBinder" class="text-red-500 hover:text-red-400 text-sm font-bold flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> RESET COLLECTION
                </button>
            </div>

            <div v-if="binder.length" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                <div v-for="(card, i) in binder" :key="i" class="relative group cursor-help">
                    <img :src="card.image_uris?.small || card.image_uris?.normal" class="rounded shadow-md group-hover:scale-110 transition-all z-10 relative">
                    <div class="absolute -bottom-1 -right-1 bg-green-600 text-[9px] px-1 rounded font-mono font-bold z-20">
                        ${{ card.prices.usd || '0' }}
                    </div>
                </div>
            </div>

            <div v-else class="text-center py-20 text-neutral-700">
                <p>Your binder is currently empty.</p>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted, computed, nextTick } = Vue;

    createApp({
        setup() {
            const setCode = ref('MKM');
            const currentPack = ref([]);
            const binder = ref([]);
            const view = ref('cracker');
            const loading = ref(false);

            onMounted(() => {
                const saved = localStorage.getItem('mtg-binder-v1');
                if (saved) binder.value = JSON.parse(saved);
                lucide.createIcons();
            });

            const totalBinderValue = computed(() => {
                return binder.value.reduce((acc, c) => acc + parseFloat(c.prices.usd || 0), 0).toFixed(2);
            });

            const getRarityClass = (rarity) => {
                if (rarity === 'mythic') return 'border-orange-500 card-glow-mythic';
                if (rarity === 'rare') return 'border-yellow-500 card-glow-rare';
                if (rarity === 'uncommon') return 'border-slate-500';
                return 'border-neutral-800';
            };

            const pullBooster = async () => {
                if (!setCode.value) return;
                loading.value = true;
                try {
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=s%3A${setCode.value}+is%3Abooster+-is%3Adigital`);
                    const data = await res.json();
                    
                    if (!data.data) throw new Error("Set not found");

                    const cards = data.data;
                    const commons = cards.filter(c => c.rarity === 'common');
                    const uncommons = cards.filter(c => c.rarity === 'uncommon');
                    const rares = cards.filter(c => c.rarity === 'rare');
                    const mythics = cards.filter(c => c.rarity === 'mythic');

                    const pack = [];
                    // Standard 15-card simulation
                    for(let i=0; i<10; i++) pack.push(commons[Math.floor(Math.random() * commons.length)]);
                    for(let i=0; i<3; i++) pack.push(uncommons[Math.floor(Math.random() * uncommons.length)]);
                    
                    // 1:8 Mythic Ratio
                    const isMythic = Math.random() < 0.125 && mythics.length > 0;
                    pack.push(isMythic ? mythics[Math.floor(Math.random() * mythics.length)] : rares[Math.floor(Math.random() * rares.length)]);
                    
                    // Land
                    const lands = cards.filter(c => c.type_line.includes('Basic Land'));
                    if(lands.length) pack.push(lands[Math.floor(Math.random() * lands.length)]);

                    currentPack.value = pack.reverse();
                    binder.value = [...pack, ...binder.value];
                    localStorage.setItem('mtg-binder-v1', JSON.stringify(binder.value));
                    
                    nextTick(() => lucide.createIcons());
                } catch (err) {
                    alert("Error: Set code may be invalid or Scryfall is down.");
                } finally {
                    loading.value = false;
                }
            };

            const clearBinder = () => {
                if(confirm("Clear your collection?")) {
                    binder.value = [];
                    localStorage.removeItem('mtg-binder-v1');
                }
            };

            return { setCode, currentPack, binder, view, loading, pullBooster, totalBinderValue, getRarityClass, clearBinder };
        }
    }).mount('#app');
</script>

</body>
</html>
